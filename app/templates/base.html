
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}SoFTgan{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/stilos.css') }}" rel="stylesheet">
</head>
<body>
  {% block header %}
  <header class="top-bar shadow-sm">
    <div class="logo-slogan">
      <a href="{{ url_for('main.index') }}">
        <img src="{{ url_for('static', filename='images/logo software.png') }}" alt="Logo">
        <p class="mb-0">Su aliado en el campo</p>
      </a>
    </div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent top-menu">
      <div class="container-fluid">
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menuSoftgan">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuSoftgan">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="#">Usuarios</a></li>
            <li class="nav-item"><a class="nav-link active" href="{{ url_for('finca.nuevo') }}">Finca</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="logout-button">
      <a href="{{ url_for('main.index') }}">
        <i class="bi bi-box-arrow-right"></i> <span>Cerrar Sesión</span>
      </a>
    </div>
  </header>
  {% endblock %}

  <main class="container-fluid mt-3">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer mt-4 text-center">
    <p>&copy; 2025 SoFTgan – Todos los derechos reservados</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
